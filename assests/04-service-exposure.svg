<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="250" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How a Kubernetes Service exposes a pod to the outside world">
  
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="20" y="25" class="b" fill="#dc2626" font-family="sans-serif" font-size="12px" font-weight="bold">❌ WITHOUT Service</text>
  <rect x="20" y="35" width="65" height="45" rx="5" fill="#f1f5f9" stroke="#64748b"/>
  <text x="52" y="62" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">🌍 User</text>
  <line x1="85" y1="57" x2="130" y2="57" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="4"/>
  <text x="107" y="48" class="b" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="12px" font-weight="bold">✗</text>
  <rect x="135" y="30" width="185" height="55" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-dasharray="3"/>
  <text x="227" y="52" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">Cluster › Node › Pod › Container</text>
  <text x="227" y="72" class="s" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="10.5px">unreachable from outside</text>

  <line x1="20" y1="100" x2="700" y2="100" stroke="#e5e7eb" stroke-width="1"/>

  <text x="20" y="128" class="b" fill="#16a34a" font-family="sans-serif" font-size="12px" font-weight="bold">✅ WITH Service (LoadBalancer)</text>
  <rect x="20" y="145" width="65" height="55" rx="5" fill="#f1f5f9" stroke="#64748b"/>
  <text x="52" y="170" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">🌍 User</text>
  <text x="52" y="188" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">browser</text>

  <line x1="85" y1="172" x2="128" y2="172" stroke="#16a34a" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="133" y="140" width="130" height="65" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="198" y="163" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">🔀 SERVICE</text>
  <text x="198" y="181" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">type: LoadBalancer</text>
  <text x="198" y="197" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">port: 80</text>

  <line x1="263" y1="172" x2="306" y2="172" stroke="#16a34a" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="311" y="128" width="240" height="90" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="431" y="148" class="b" text-anchor="middle" fill="#15803d" font-family="sans-serif" font-size="12px" font-weight="bold">CLUSTER</text>
  <rect x="330" y="156" width="95" height="50" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="377" y="177" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">📦 Pod 1</text>
  <text x="377" y="195" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">🐳 nginx:80</text>
  <rect x="437" y="156" width="95" height="50" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="484" y="177" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">📦 Pod 2</text>
  <text x="484" y="195" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">🐳 nginx:80</text>

  <text x="570" y="150" class="b" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">Traffic is</text>
  <text x="570" y="168" class="b" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">load-balanced</text>
  <text x="570" y="186" class="s" fill="#4b5563" font-family="sans-serif" font-size="10.5px">across all Pods</text>
  <text x="570" y="204" class="s" fill="#4b5563" font-family="sans-serif" font-size="10.5px">matching the label</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="740" height="300" viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How ConfigMap injects the service name into the node app enabling pod to pod communication">
  
  <defs>
    <marker id="a8" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4f46e5"/>
    </marker>
    <marker id="a9" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <text x="15" y="20" class="b" fill="#475569" font-family="sans-serif" font-size="11px" font-weight="bold">🔗 The Complete Wiring: ConfigMap → Env Var → Service Name → Database Pod</text>

  <rect x="18" y="35" width="165" height="88" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="100" y="55" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11px" font-weight="bold">📋 ConfigMap</text>
  <text x="100" y="72" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="9.5px">name: mongo-config</text>
  <line x1="30" y1="80" x2="171" y2="80" stroke="#d97706" stroke-dasharray="2"/>
  <text x="100" y="95" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="9.5px">MONGO_HOST:</text>
  <text x="100" y="109" class="c" text-anchor="middle" font-weight="bold" fill="#7c2d12" font-family="monospace" font-size="9.5px">"service-mongodb"</text>

  <line x1="100" y1="123" x2="100" y2="160" stroke="#4f46e5" stroke-width="2" marker-end="url(#a8)"/>
  <text x="106" y="146" class="s" fill="#6b7280" font-family="sans-serif" font-size="9.5px">injected via</text>
  <text x="106" y="157" class="c" fill="#7c2d12" font-family="monospace" font-size="9.5px">configMapKeyRef</text>

  <rect x="18" y="165" width="230" height="115" rx="7" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="133" y="185" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11px" font-weight="bold">📦 Pod A — Node Web UI</text>
  <rect x="33" y="195" width="200" height="72" rx="5" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="133" y="213" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11px" font-weight="bold">🐳 node-app</text>
  <text x="133" y="231" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="9.5px">env: MONGO_HOST=</text>
  <text x="133" y="245" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="9.5px">"service-mongodb"</text>
  <text x="133" y="261" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="9.5px">connects to ↴</text>

  <line x1="248" y1="230" x2="300" y2="230" stroke="#16a34a" stroke-width="2.2" marker-end="url(#a9)"/>
  <text x="274" y="222" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="9.5px">:27017</text>

  <rect x="305" y="185" width="185" height="90" rx="7" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="397" y="207" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11px" font-weight="bold">🔀 SERVICE</text>
  <text x="397" y="226" class="c" text-anchor="middle" font-weight="bold" fill="#7c2d12" font-family="monospace" font-size="9.5px">service-mongodb</text>
  <text x="397" y="243" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="9.5px">type: ClusterIP</text>
  <text x="397" y="260" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="9.5px">(internal only 🔒)</text>

  <line x1="490" y1="230" x2="542" y2="230" stroke="#16a34a" stroke-width="2.2" marker-end="url(#a9)"/>

  <rect x="547" y="185" width="180" height="90" rx="7" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="637" y="205" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11px" font-weight="bold">📦 Pod B — Database</text>
  <rect x="562" y="215" width="150" height="48" rx="5" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="637" y="235" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11px" font-weight="bold">🐳 mongo</text>
  <text x="637" y="252" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="9.5px">listens :27017</text>

  <rect x="270" y="40" width="455" height="80" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="4"/>
  <text x="497" y="60" class="b" text-anchor="middle" fill="#15803d" font-family="sans-serif" font-size="11px" font-weight="bold">🔑 THE KEY INSIGHT</text>
  <text x="497" y="80" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="9.5px">A Service's NAME becomes a DNS hostname inside the cluster.</text>
  <text x="497" y="98" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="9.5px">Pods find each other by service name — never by IP address</text>
  <text x="497" y="113" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="9.5px">(Pod IPs change on every restart, service names don't ✅).</text>
</svg>

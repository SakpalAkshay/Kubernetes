<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Service port versus targetPort mapping">
  
  <defs>
    <marker id="a6" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <text x="15" y="22" class="b" fill="#475569" font-family="sans-serif" font-size="11.5px" font-weight="bold">🔌 port vs targetPort — which is which?</text>

  <rect x="20" y="55" width="105" height="70" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="72" y="82" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">🌍 Client</text>
  <text x="72" y="101" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">browser /</text>
  <text x="72" y="116" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">other Pod</text>

  <line x1="125" y1="90" x2="188" y2="90" stroke="#16a34a" stroke-width="2" marker-end="url(#a6)"/>
  <text x="156" y="80" class="c" text-anchor="middle" font-weight="bold" fill="#7c2d12" font-family="monospace" font-size="10.5px">:8080</text>

  <rect x="193" y="45" width="175" height="90" rx="7" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="280" y="70" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">🔀 SERVICE</text>
  <text x="280" y="93" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="10.5px">port: 8080</text>
  <text x="280" y="111" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">↕ translates ↕</text>
  <text x="280" y="128" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="10.5px">targetPort: 3000</text>

  <line x1="368" y1="90" x2="431" y2="90" stroke="#16a34a" stroke-width="2" marker-end="url(#a6)"/>
  <text x="399" y="80" class="c" text-anchor="middle" font-weight="bold" fill="#7c2d12" font-family="monospace" font-size="10.5px">:3000</text>

  <rect x="436" y="45" width="175" height="90" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="523" y="70" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">📦 POD</text>
  <rect x="455" y="80" width="137" height="45" rx="5" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="523" y="99" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">🐳 Container</text>
  <text x="523" y="117" class="c" text-anchor="middle" fill="#7c2d12" font-family="monospace" font-size="10.5px">app listens :3000</text>

  <text x="20" y="160" class="s" fill="#6b7280" font-family="sans-serif" font-size="10px"><tspan class="c" font-weight="bold" fill="#7c2d12" font-family="monospace" font-size="10.5px">port</tspan> = what the SERVICE exposes (you choose this — clients connect here)</text>
  <text x="20" y="180" class="s" fill="#6b7280" font-family="sans-serif" font-size="10px"><tspan class="c" font-weight="bold" fill="#7c2d12" font-family="monospace" font-size="10.5px">targetPort</tspan> = what your APP listens on inside the container (dictated by your code)</text>
</svg>

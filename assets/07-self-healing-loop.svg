  <text x="282" y="98" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10.5px">"0 Pods — crashed!"</text>

  <line x1="347" y1="85" x2="394" y2="85" stroke="#4f46e5" stroke-width="2" marker-end="url(#a4)"/>
  <text x="370" y="76" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10.5px">drift!</text>


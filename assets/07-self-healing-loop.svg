  <text x="638" y="98" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10.5px">RESTARTS +1</text>

  <path d="M 638 118 Q 638 160 360 160 Q 100 160 100 120" fill="none" stroke="#4f46e5" stroke-width="1.8" stroke-dasharray="5" marker-end="url(#a4)"/>
  <text x="360" y="177" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10.5px">loop repeats forever — this is what the Controller Manager does</text>

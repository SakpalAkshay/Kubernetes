<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="300" viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison of single server failure versus Kubernetes managed cluster">
  
  <text x="20" y="24" class="ttl" fill="#1f2937" font-family="sans-serif" font-size="15px" font-weight="bold">❌ Without Orchestration</text>
  <rect x="20" y="40" width="330" height="230" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-dasharray="4"/>
  <rect x="45" y="70" width="90" height="55" rx="5" class="bad" fill="#fee2e2" stroke="#dc2626" stroke-width="2" />
  <text x="90" y="94" class="lbl" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Server 1</text>
  <text x="90" y="112" class="sm" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">💀 CRASHED</text>
  <rect x="150" y="70" width="90" height="55" rx="5" class="box" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="195" y="94" class="lbl" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Server 2</text>
  <text x="195" y="112" class="sm" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">overloaded</text>
  <rect x="255" y="70" width="70" height="55" rx="5" class="box" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="290" y="94" class="lbl" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Server 3</text>
  <text x="290" y="112" class="sm" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">idle</text>
  <text x="40" y="160" class="lbl" fill="#374151" font-family="sans-serif" font-size="12px">😰 Human admin must:</text>
  <text x="55" y="182" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• Notice the crash manually</text>
  <text x="55" y="200" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• SSH in, restart the container</text>
  <text x="55" y="218" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• Rebalance traffic by hand</text>
  <text x="55" y="236" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• Repeat for every server, forever</text>
  <text x="55" y="258" class="sm" fill="#dc2626" font-family="sans-serif" font-size="10px">→ Downtime. Doesn't scale.</text>

  <text x="410" y="24" class="ttl" fill="#1f2937" font-family="sans-serif" font-size="15px" font-weight="bold">✅ With Kubernetes</text>
  <rect x="410" y="40" width="330" height="230" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
  <rect x="500" y="55" width="150" height="38" rx="5" class="k8s" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" />
  <text x="575" y="79" class="lbl" text-anchor="middle" font-weight="bold" fill="#374151" font-family="sans-serif" font-size="12px">Control Plane 🎼</text>
  <line x1="575" y1="93" x2="470" y2="125" stroke="#4f46e5" stroke-width="1.5"/>
  <line x1="575" y1="93" x2="575" y2="125" stroke="#4f46e5" stroke-width="1.5"/>
  <line x1="575" y1="93" x2="680" y2="125" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="430" y="125" width="80" height="48" rx="5" class="good" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
  <text x="470" y="146" class="lbl" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Node 1</text>
  <text x="470" y="163" class="sm" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">✔ healthy</text>
  <rect x="535" y="125" width="80" height="48" rx="5" class="good" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
  <text x="575" y="146" class="lbl" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Node 2</text>
  <text x="575" y="163" class="sm" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">✔ healthy</text>
  <rect x="640" y="125" width="80" height="48" rx="5" class="good" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
  <text x="680" y="146" class="lbl" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Node 3</text>
  <text x="680" y="163" class="sm" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">✔ restarted</text>
  <text x="430" y="200" class="lbl" fill="#374151" font-family="sans-serif" font-size="12px">🤖 Kubernetes automatically:</text>
  <text x="445" y="222" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• Detects failure → restarts (self-heal)</text>
  <text x="445" y="240" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• Spreads load across replicas</text>
  <text x="445" y="258" class="sm" fill="#6b7280" font-family="sans-serif" font-size="10px">• Rolls out updates with zero downtime</text>
</svg>

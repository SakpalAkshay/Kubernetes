<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="340" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nesting hierarchy from cluster to node to pod to container">
  
  <rect x="15" y="15" width="670" height="310" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="32" y="38" class="t" fill="#475569" font-family="sans-serif" font-size="13px" font-weight="bold">🌐 CLUSTER  (group of nodes)</text>

  <rect x="35" y="52" width="405" height="255" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="52" y="75" class="t" fill="#1d4ed8" font-family="sans-serif" font-size="13px" font-weight="bold">🖥️ NODE  (a server / VM)</text>
  <text x="52" y="92" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">Runs kubelet + kube-proxy + container runtime</text>

  <rect x="55" y="104" width="365" height="185" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="72" y="127" class="t" fill="#15803d" font-family="sans-serif" font-size="13px" font-weight="bold">📦 POD  (smallest unit in K8s)</text>
  <text x="72" y="144" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">Isolated env • own IP • shared network &amp; storage</text>

  <rect x="78" y="158" width="150" height="115" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="153" y="180" class="t" fill="#a16207" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="bold">🐳 Container A</text>
  <text x="153" y="200" class="n" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">Node.js Web UI</text>
  <text x="153" y="220" class="d" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="11px">listens :3000</text>
  <text x="153" y="245" class="d" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="11px">(your app image)</text>

  <rect x="245" y="158" width="155" height="115" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="322" y="180" class="t" fill="#a16207" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="bold">🐳 Container B</text>
  <text x="322" y="200" class="n" text-anchor="middle" fill="#374151" font-family="sans-serif" font-size="12px">MongoDB</text>
  <text x="322" y="220" class="d" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="11px">listens :27017</text>
  <text x="322" y="245" class="d" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="11px">(optional sidecar)</text>

  <text x="470" y="80" class="t" fill="#dc2626" font-family="sans-serif" font-size="13px" font-weight="bold">⚠️ Why can't I reach</text>
  <text x="470" y="98" class="t" fill="#dc2626" font-family="sans-serif" font-size="13px" font-weight="bold">localhost:3000 ?</text>
  <text x="470" y="126" class="n" fill="#374151" font-family="sans-serif" font-size="12px">Your app is buried</text>
  <text x="470" y="144" class="n" fill="#374151" font-family="sans-serif" font-size="12px">4 layers deep:</text>
  <text x="482" y="170" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">Container → Pod →</text>
  <text x="482" y="188" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">Node → Cluster →</text>
  <text x="482" y="206" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">…then the internet</text>
  <text x="470" y="238" class="t" fill="#16a34a" font-family="sans-serif" font-size="13px" font-weight="bold">✅ Fix: create a</text>
  <text x="470" y="256" class="t" fill="#16a34a" font-family="sans-serif" font-size="13px" font-weight="bold">SERVICE object</text>
  <text x="470" y="278" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">(punches a hole through</text>
  <text x="470" y="294" class="d" fill="#6b7280" font-family="sans-serif" font-size="11px">all those layers)</text>
</svg>

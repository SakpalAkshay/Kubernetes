<?xml version="1.0" encoding="UTF-8"?>
<svg width="740" height="300" viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flow of a kubectl create deployment command through Kubernetes components">
  
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect x="15" y="115" width="105" height="60" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="67" y="140" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">👤 You</text>
  <text x="67" y="160" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">kubectl ...</text>

  <line x1="120" y1="145" x2="163" y2="145" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="141" cy="128" r="9" fill="#4f46e5"/><text x="141" y="132" class="num" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11px" font-weight="bold">1</text>

  <rect x="168" y="30" width="230" height="235" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="283" y="52" class="b" text-anchor="middle" fill="#4338ca" font-family="sans-serif" font-size="12px" font-weight="bold">CONTROL PLANE</text>

  <rect x="185" y="63" width="196" height="42" rx="5" fill="#fff" stroke="#4f46e5"/>
  <text x="283" y="80" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">API Server</text>
  <text x="283" y="96" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">validates &amp; accepts request</text>

  <rect x="185" y="115" width="196" height="42" rx="5" fill="#fff" stroke="#4f46e5"/>
  <text x="283" y="132" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">etcd</text>
  <text x="283" y="148" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">stores desired state</text>
  <circle cx="176" cy="136" r="9" fill="#4f46e5"/><text x="176" y="140" class="num" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11px" font-weight="bold">2</text>

  <rect x="185" y="167" width="196" height="42" rx="5" fill="#fff" stroke="#4f46e5"/>
  <text x="283" y="184" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">Scheduler</text>
  <text x="283" y="200" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">picks the best node</text>
  <circle cx="176" cy="188" r="9" fill="#4f46e5"/><text x="176" y="192" class="num" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11px" font-weight="bold">3</text>

  <rect x="185" y="219" width="196" height="36" rx="5" fill="#fff" stroke="#4f46e5"/>
  <text x="283" y="242" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">Controller Manager 👁️</text>

  <line x1="398" y1="188" x2="443" y2="150" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="424" cy="158" r="9" fill="#4f46e5"/><text x="424" y="162" class="num" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11px" font-weight="bold">4</text>

  <rect x="448" y="30" width="275" height="235" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="585" y="52" class="b" text-anchor="middle" fill="#15803d" font-family="sans-serif" font-size="12px" font-weight="bold">WORKER NODE</text>

  <rect x="465" y="63" width="240" height="40" rx="5" fill="#fff" stroke="#16a34a"/>
  <text x="585" y="80" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">Kubelet (agent)</text>
  <text x="585" y="96" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">receives instruction, pulls image</text>

  <rect x="465" y="113" width="240" height="95" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-dasharray="3"/>
  <text x="585" y="133" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">📦 POD created</text>
  <rect x="500" y="143" width="170" height="52" rx="4" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="585" y="164" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">🐳 Container</text>
  <text x="585" y="182" class="s" text-anchor="middle" fill="#4b5563" font-family="sans-serif" font-size="10.5px">your app running</text>
  <circle cx="456" cy="140" r="9" fill="#16a34a"/><text x="456" y="144" class="num" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11px" font-weight="bold">5</text>

  <rect x="465" y="218" width="240" height="37" rx="5" fill="#fff" stroke="#16a34a"/>
  <text x="585" y="241" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="12px" font-weight="bold">Kube-proxy 🔌 (network rules)</text>

  <text x="20" y="220" class="s" fill="#4b5563" font-family="sans-serif" font-size="10.5px">Desired state</text>
  <text x="20" y="238" class="s" fill="#4b5563" font-family="sans-serif" font-size="10.5px">is declared;</text>
  <text x="20" y="256" class="s" fill="#4b5563" font-family="sans-serif" font-size="10.5px">K8s makes it</text>
  <text x="20" y="274" class="s" fill="#4b5563" font-family="sans-serif" font-size="10.5px">real. ♻️</text>
</svg>

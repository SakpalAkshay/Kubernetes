<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="220" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The split database problem when replicating a pod containing a database">
  
  <defs>
    <marker id="a7" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0891b2"/>
    </marker>
  </defs>
  <text x="15" y="20" class="b" fill="#dc2626" font-family="sans-serif" font-size="11.5px" font-weight="bold">💀 The Split-Database Bug — why "replicas: 2" with an in-pod DB is broken</text>

  <rect x="20" y="80" width="80" height="55" rx="5" fill="#f1f5f9" stroke="#64748b"/>
  <text x="60" y="103" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">🌍 User</text>
  <text x="60" y="121" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">refreshes</text>

  <line x1="100" y1="107" x2="140" y2="107" stroke="#0891b2" stroke-width="2" marker-end="url(#a7)"/>

  <rect x="145" y="80" width="95" height="55" rx="5" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.8"/>
  <text x="192" y="103" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">🔀 SERVICE</text>
  <text x="192" y="121" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">round-robin</text>

  <line x1="240" y1="98" x2="290" y2="65" stroke="#0891b2" stroke-width="1.8" marker-end="url(#a7)"/>
  <line x1="240" y1="118" x2="290" y2="152" stroke="#0891b2" stroke-width="1.8" marker-end="url(#a7)"/>

  <rect x="295" y="35" width="230" height="65" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="410" y="53" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">📦 Pod 1</text>
  <rect x="310" y="60" width="95" height="32" rx="4" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="357" y="81" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">🐳 Node</text>
  <rect x="415" y="60" width="98" height="32" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="464" y="81" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">🐳 Mongo #1</text>

  <rect x="295" y="122" width="230" height="65" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="410" y="140" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">📦 Pod 2</text>
  <rect x="310" y="147" width="95" height="32" rx="4" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="357" y="168" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">🐳 Node</text>
  <rect x="415" y="147" width="98" height="32" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="464" y="168" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">🐳 Mongo #2</text>

  <text x="540" y="60" class="e" fill="#dc2626" font-family="sans-serif" font-size="10px">📧 has: raju@…</text>
  <text x="540" y="78" class="e" fill="#dc2626" font-family="sans-serif" font-size="10px">(3 emails)</text>
  <text x="540" y="152" class="e" fill="#dc2626" font-family="sans-serif" font-size="10px">📭 EMPTY</text>
  <text x="540" y="170" class="e" fill="#dc2626" font-family="sans-serif" font-size="10px">(different DB!)</text>

  <text x="540" y="110" class="b" fill="#dc2626" font-family="sans-serif" font-size="11.5px" font-weight="bold">❌ Data</text>
  <text x="540" y="126" class="b" fill="#dc2626" font-family="sans-serif" font-size="11.5px" font-weight="bold">"randomly"</text>
  <text x="540" y="142" class="b" fill="#dc2626" font-family="sans-serif" font-size="11.5px" font-weight="bold">disappears</text>

  <text x="20" y="205" class="s" fill="#6b7280" font-family="sans-serif" font-size="10px">👉 <tspan font-weight="bold">Lesson:</tspan> Never bundle a database inside a replicated Pod. Give the DB its OWN Pod + Service.</text>
</svg>

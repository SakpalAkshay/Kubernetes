  <text x="515" y="66" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">Terminating</text>
  <text x="515" y="81" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">graceful</text>

  <rect x="255" y="105" width="215" height="38" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  <text x="362" y="121" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">📦 NEW Pod (v5)</text>
  <text x="362" y="136" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">ContainerCreating · 0/1</text>

  <rect x="470" y="105" width="210" height="38" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="575" y="121" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">📦 NEW Pod (v5)</text>

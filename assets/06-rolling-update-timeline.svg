  <rect x="40" y="158" width="640" height="26" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-dasharray="3"/>
  <text x="360" y="176" class="b" text-anchor="middle" fill="#1d4ed8" font-family="sans-serif" font-size="11.5px" font-weight="bold">🟢 USER-FACING UPTIME: 100% — at every instant, at least one Pod is Running</text>

  <line x1="90" y1="196" x2="90" y2="204" stroke="#9ca3af" stroke-width="2"/>
  <text x="90" y="218" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">t0</text>
  <line x1="300" y1="196" x2="300" y2="204" stroke="#9ca3af" stroke-width="2"/>
  <text x="300" y="218" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">t1</text>
  <line x1="510" y1="196" x2="510" y2="204" stroke="#9ca3af" stroke-width="2"/>
  <text x="510" y="218" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">t2</text>
  <line x1="650" y1="196" x2="650" y2="204" stroke="#9ca3af" stroke-width="2"/>
  <text x="650" y="218" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">t3</text>

  <rect x="40" y="50" width="215" height="38" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="147" y="66" class="b" text-anchor="middle" fill="#1f2937" font-family="sans-serif" font-size="11.5px" font-weight="bold">📦 OLD Pod (v2)</text>
  <text x="147" y="81" class="s" text-anchor="middle" fill="#6b7280" font-family="sans-serif" font-size="10px">Running · serving 100% traffic</text>

  <rect x="255" y="50" width="215" height="38" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="240" viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rolling update timeline showing zero downtime deployment">
  
  <text x="15" y="22" class="b" fill="#475569" font-family="sans-serif" font-size="11.5px" font-weight="bold">⏱️ Rolling Update — the old Pod never dies until the new one is Ready</text>

  <line x1="30" y1="200" x2="690" y2="200" stroke="#9ca3af" stroke-width="2"/>
